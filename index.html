<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KBF AI Analyst Naming Ceremony</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<section id="pageEnvelope" class="page active" onclick="goToPage('pageInvitation')">
  <img src="assets/hero-invitation.png" class="bg-img" alt="Invitation Envelope" />
  <div class="bottom-guide">화면을 눌러 초청장을 열어주세요</div>
</section>

<section id="pageInvitation" class="page">
  <img src="assets/invitation-card.png" class="bg-img" alt="Invitation Card" />
  <div class="invitation-text">
    <p class="eyebrow">PRIVATE INVITATION</p>
    <h1>KBF AI Analyst<br>Naming Ceremony 2026</h1>
    <p>
      선배님들,<br><br>
      KBF 최초의 AI 구성원이<br>
      정식 입사를 앞두고 있습니다.<br><br>
      이제 이 구성원에게<br>
      이름을 선물해 주세요.
    </p>
    <button class="gold-btn" onclick="goToPage('pageVote')">후보 보기</button>
  </div>
</section>

<section id="pageVote" class="page scroll-page">
  

  <div class="vote-content">
    <p class="eyebrow">NOMINEE SELECTION</p>
<h2>AI 구성원 이름을 선택해 주세요</h2>
<div id="voteCount" class="vote-count">0 / 3 선택</div>
<p class="vote-guide">마음에 드는 후보를 최대 3개까지 선택해 주세요.</p>

    <div id="candidate-list"></div>

    <button class="vote-btn" onclick="submitVote()">투표하기</button>
  </div>
</section>

<section id="pageThankyou" class="page">
  <img src="assets/thankyou-background.png" class="bg-img" alt="Thank You" />
  <div class="thankyou-text">
    <p class="eyebrow">KOREA BUNKER FO</p>
    <h1>THANK YOU</h1>
    <p>Your Vote Has Been Recorded.</p>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
